<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7CHROMA — Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><defs><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/><feColorMatrix in="noise" type="saturate" values="0.3"/></filter></defs><rect width="100" height="100" fill="%23000" filter="url(%23noise)"/></svg>');
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: overlay;
        }

        .hero-container {
            width: 100%;
            height: auto;
            background: #000;
            position: relative;
            z-index: 0;
        }

        .hero-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        .section {
            border: 1px solid #222;
            padding: 30px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: #888;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .form-group {
            display: flex;
            gap: 0;
            margin-bottom: 15px;
        }

        .country-code {
            padding: 12px 12px;
            border: 1px solid #222;
            background: rgba(10,10,10,0.9);
            color: #fff;
            font-size: 1rem;
            width: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: none;
        }

        input[type="tel"],
        input[type="email"] {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #222;
            background: rgba(10,10,10,0.9);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: #555;
        }

        input:focus {
            border-color: #00d9ff;
            background: rgba(0,217,255,0.05);
            box-shadow: 0 0 15px rgba(0,217,255,0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #D4A5D4;
            color: #000;
            border: none;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #e0b5e0;
            transform: translateY(-2px);
        }

        button:active {
            box-shadow: 0 0 20px rgba(212,165,212,0.6);
            transform: translateY(0);
        }

        .description {
            font-size: 0.85rem;
            color: #777;
            margin-top: 12px;
            line-height: 1.5;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #222;
        }

        .social-link {
            width: 45px;
            height: 45px;
            border: 1px solid #222;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        .social-link:hover {
            border-color: #00d9ff;
            color: #00d9ff;
            box-shadow: 0 0 10px rgba(0,217,255,0.3);
        }

        .footer-text {
            text-align: center;
            font-size: 0.8rem;
            color: #555;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 16px;
            }

            .section {
                padding: 25px;
                margin-bottom: 16px;
            }

            button {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Image -->
    <div class="hero-container">
        <img src="/images/landing.jpg" alt="7CHROMA" class="hero-image">
    </div>

    <div class="container">
        <!-- SMS Section -->
        <div class="section">
            <div class="section-title">7CHROMA Early Access</div>
            <form id="smsForm">
                <div class="form-group">
                    <div class="country-code">🇬🇧 +1</div>
                    <input type="tel" id="phoneNumber" placeholder="Enter your mobile number" required>
                </div>
                <button type="submit">JOIN LIST</button>
            </form>
            <p class="description">Access drop 30 minutes before with password SMS to your device.</p>
        </div>

        <!-- Email Section -->
        <div class="section">
            <div class="section-title">For Updates & Launch News</div>
            <form id="emailForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Enter your email address" required>
                </div>
                <button type="submit">JOIN LIST</button>
            </form>
            <p class="description">Be the first to know about drops, new releases and exclusive content.</p>
        </div>

        <!-- Social Links -->
        <div class="socials">
            <a href="#" class="social-link">📷</a>
            <a href="#" class="social-link">🎵</a>
            <a href="#" class="social-link">▶️</a>
            <a href="#" class="social-link">𝕏</a>
            <a href="#" class="social-link">✉️</a>
        </div>

        <!-- Footer -->
        <div class="footer-text">
            © 2024 7CHROMA. ALL RIGHTS RESERVED.
        </div>
    </div>

    <script>
        document.getElementById('smsForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const phone = document.getElementById('phoneNumber').value;
            console.log('SMS submitted:', phone);
        });

        document.getElementById('emailForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            console.log('Email submitted:', email);
        });
    </script>
</body>
</html>
