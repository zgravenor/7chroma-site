<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7CHROMA — Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        .hero-container {
            width: 100%;
            height: auto;
            background: #000;
        }

        .hero-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .section {
            border: 1px solid #333;
            padding: 40px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.02);
        }

        .section-title {
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: #aaa;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .form-group {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
        }

        .country-code {
            padding: 14px 12px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            width: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input[type="tel"],
        input[type="email"],
        input[type="password"] {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        input::placeholder {
            color: #666;
        }

        input:focus {
            border-color: #00d9ff;
            background: #222;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #D4A5D4;
            color: #000;
            border: none;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        button:hover {
            background: #f0f0f0;
        }

        .description {
            font-size: 0.9rem;
            color: #888;
            margin-top: 15px;
            line-height: 1.5;
        }

        .password-section {
            margin-bottom: 40px;
        }

        .password-section input {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-bottom: 1px solid #333;
            background: transparent;
            font-size: 1rem;
            text-align: center;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid #222;
        }

        .social-link {
            width: 50px;
            height: 50px;
            border: 1px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            text-decoration: none;
            transition: all 0.3s;
        }

        .social-link:hover {
            border-color: #00d9ff;
            color: #00d9ff;
        }

        .footer-text {
            text-align: center;
            font-size: 0.85rem;
            color: #666;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            .section {
                padding: 30px 20px;
            }

            button {
                padding: 14px;
            }

            .socials {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Image -->
    <div class="hero-container">
        <img src="/images/landing.jpg" alt="7CHROMA" class="hero-image">
    </div>

    <div class="container">
        <!-- Password Section -->
        <div class="password-section">
            <input type="password" placeholder="Enter password for early access">
        </div>

        <!-- SMS Section -->
        <div class="section">
            <div class="section-title">For Earlier Access</div>
            <form id="smsForm">
                <div class="form-group">
                    <div class="country-code">🇬🇧 +1</div>
                    <input type="tel" id="phoneNumber" placeholder="Enter your mobile number" required>
                </div>
                <button type="submit">SEND SMS</button>
            </form>
            <p class="description">Access drop 30 minutes before with password SMS to your device.</p>
        </div>

        <!-- Email Section -->
        <div class="section">
            <div class="section-title">For Updates & Launch News</div>
            <form id="emailForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Enter your email address" required>
                </div>
                <button type="submit">JOIN LIST</button>
            </form>
            <p class="description">Be the first to know about drops, new releases and exclusive content.</p>
        </div>

        <!-- Social Links -->
        <div class="socials">
            <a href="#" class="social-link">📷</a>
            <a href="#" class="social-link">🎵</a>
            <a href="#" class="social-link">▶️</a>
            <a href="#" class="social-link">𝕏</a>
            <a href="#" class="social-link">✉️</a>
        </div>

        <!-- Footer -->
        <div class="footer-text">
            © 2024 7CHROMA. ALL RIGHTS RESERVED.
        </div>
    </div>

    <script>
        document.getElementById('smsForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const phone = document.getElementById('phoneNumber').value;
            // TODO: Add Twilio SMS integration
            console.log('SMS submitted:', phone);
        });

        document.getElementById('emailForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            // TODO: Add email list integration
            console.log('Email submitted:', email);
        });
    </script>
</body>
</html>
